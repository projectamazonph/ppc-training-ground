sprint_8_notes: >
  Sprint 8 closed 2026-07-11 (commit 1414754). Wired transactional emails (Resend + React Email):
  enrollment confirmation on payment webhook, live class reminder on registration, refund status
  notifications on request/approve/reject. Created /api/resend/webhook for delivery tracking.
  Refund flow shipped end-to-end (student request → admin approve/reject → email + DB update).

sprint_9_notes: >
  Sprint 9 completed 2026-07-12. All 5 stories done: design system audit (email template
  exception added to no-tailwind ESLint rule), responsive breakpoint infrastructure
  (--bp-sm/md/lg/xl + --side-pad + --max-* in globals.css, 3 helper classes), BottomNav
  component (4-slot, mobile-only, safe-area-inset), marketing+auth mobile-first refactor
  (landing page rewrite, pricing grid, auth/checkout padding), student app shell refactor
  (dashboard stats grid, tools grid, certificates/payments token fixes, BottomNav on
  dashboard/tools). All pages render at 390px and 1280px. Lint clean. 7 commits.

sprint_10_notes: >
  Sprint 10 in progress (2026-07-13). Test infrastructure created: vitest.config.ts,
  src/lib/__tests__/ (8 test files), src/app/actions/__tests__/ (3 test files),
  playwright.config.ts, scripts/check-coverage.js. 50/53 tests passing; 3 broken mocks
  in tool-actions.test.ts (requireAuth not mocked). CI workflow updated: tsc, lint,
  vitest, playwright, lighthouse-ci, gitleaks. Remaining: coverage threshold enforcement,
  Playwright E2E critical path, server action integration tests, fix broken tool-action mocks.

sprint_11_notes: >
  Sprint 11 — Observability (2026-07-15). 5 stories planned: Sentry setup, structured logging
  (Pino), server action tracing, Lighthouse CI budgets, Slack alerting. Goal: production
  error tracking + performance budgets before launch.
