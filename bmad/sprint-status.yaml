    epic: "Payments"
    owner: "Ryan"
    completed_date: "2026-07-09"
    notes: "Shipped in commit fdfa8af. POST /api/paymongo/webhook with HMAC-SHA256 signature verify against PAYMONGO_WEBHOOK_SECRET + ProcessedWebhook idempotency log (unique on paymongoEventId). Public /pricing page with 3-tier layout + CheckoutButton calling createCheckoutSessionAction. /checkout/complete page with success/pending/failed states. Library code (paymongo.ts, webhook-signature.ts, enrollment.ts, pricing.ts, checkout.ts) all wired. Migration 20260708042743 applied. TypeScript 0 errors."

  - id: "STORY-027"
    title: "Tie Enrollment to Payment — verified payments grant tier-gated course access"
    points: 1
    status: "completed"
    sprint: 6
    epic: "Payments"
    owner: "Ryan"
    started_date: "2026-07-10"
    completed_date: "2026-07-10"
    notes: "Guest checkout completion flow: /checkout/complete detects no session + paid checkout → redirects to /auth/signup?email=<checkout.email>&next=/checkout/complete. SignUpForm pre-fills email (editable, with hint), respects ?next= for return URL. signUpAction upgraded to claim placeholder accounts (passwordHash starts with `placeholder_`) — replaces hash, sets name + emailVerified in place. /pricing page on flow close. Seed script adds grandfatherFreeEnrollment() — any pre-existing user without an enrollment gets a backdated ACTIVE Enrollment at PPC_FOUNDATIONS so the tier gate doesn't lock the curriculum post-launch. tier-gate.ts gains TierAccessDeniedError + requireCourseAccess() helper for future server-action use. TypeScript 0 errors. AI-slop scan clean."

  - id: "STORY-028"
    title: "Refund flow — student request, admin approval, PayMongo refund call"
    points: 1
    status: "completed"
    sprint: 6
    epic: "Payments"
    owner: "Ryan"
    started_date: "2026-07-10"
    completed_date: "2026-07-10"
    notes: "Shipped in commit pending. Student-side: /dashboard/payments lists payments with refund eligibility (7-day window) + status badges, /dashboard/payments/[id]/request-refund form posts reason to createRefundRequestAction. Admin-side: /admin/refunds queue (FIFO, oldest first) with PROCESSED/REJECTED month counts, /admin/refunds/[id] detail with approve/reject inline forms. Library: src/lib/refunds.ts with isWithinRefundWindow / daysRemainingInWindow / hasBlockingRefundRequest / alreadyRefundedAmountPhp + listUserPayments / listPendingRefundRequests / getRefundRequestDetail. Actions: src/app/actions/refunds.ts — createRefundRequestAction (validates ownership, eligibility, no open request; computes full refund amount = payment.amountPhp - alreadyRefunded), approveRefundAction (PayMongo refundPayment() call, status PENDING→APPROVED→PROCESSED with FAILED branch on API error; idempotent on double-admin race via updateMany status guard), rejectRefundAction (PENDING→REJECTED, requires reviewer note ≥10 chars). Sidebar link added. Webhook handlePaymentRefunded() in src/lib/enrollment.ts remains the source of truth for Payment.status + Enrollment.status updates. Email confirmations stubbed for Sprint 8 (Resend). TypeScript 0 errors, AI-slop scan clean."

  - id: "STORY-029"
    title: "Receipt PDF — BIR-compliant sequential numbering + Vercel Blob storage"
    points: 1
    status: "completed"
    sprint: 6
    epic: "Payments"
    owner: "Ryan"
    started_date: "2026-07-10"
    completed_date: "2026-07-10"
    notes: "Shipped in commit pending. PDF template (src/lib/receipt-pdf.tsx) — @react-pdf/renderer Document with header (business name + TIN), receipt number, buyer block, line items table, VAT breakdown (Net + 12% VAT + Grand Total), footer with payment reference. Format follows BIR receipt conventions. Library (src/lib/receipts.tsx) — formatReceiptNumber(sequence, year) produces 'BS 00001-2026', nextInvoiceSequence(year) finds max across all invoices ending in the year + 1, issueInvoiceForPayment(paymentId) idempotent (returns existing if any) — splits gross into net + VAT via inclusive pricing (net = gross/1.12, vat = gross-net), persist Invoice row. renderInvoicePdf(invoiceId) builds ReceiptData, calls renderToBuffer, writes to public/receipts/{id}.pdf. API route /api/invoices/[id]/pdf — owner-only, lazy-renders if pdfUrl is null, returns application/pdf with content-disposition inline. Auto-issue wired into handleCheckoutPaid (enrollment.ts) right after Payment create — try/catch so a numbering race can't fail the webhook. Storage SWAP POINT documented in receipts.tsx: replace fs.writeFile with @vercel/blob upload. Student UI: /dashboard/payments shows receipt number badge per payment + Download receipt button (ghost variant with Download icon) opening /api/invoices/{id}/pdf in new tab. Bonus: src/lib/format.ts extracted (formatPhp, formatDate, formatDateTime, formatReceiptNumber) — payments page now uses shared formatters instead of duplicates. TypeScript 0 errors. AI-slop scan clean."

