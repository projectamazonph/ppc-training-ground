    notes: "src/components/tools/ListingAuditRunner.tsx. 2-step form: (1) flag issues with checkboxes per field (title/bullets/description/images/aplus/pricing/reviews), (2) revise the listing (title/bullets array with add/remove, description, image count, A+ toggle, price, review count, rating). Reuses startToolSession + saveToolSession + submitToolSession. ToolResult shows the grade breakdown."

  - id: "STORY-022"
    title: "Keyword Research categorizer UI"
    points: 0.5
    status: "completed"
    sprint: 4
    epic: "Tools"
    owner: "Ryan"
    notes: "src/components/tools/KeywordResearchRunner.tsx. Per-candidate row: keyword + relevance/volume/competition metric chips + optional notes input + 3-button priority picker (PRIMARY/SECONDARY/NEGATIVE). Live count summary at top (4 buckets). Submit blocked until every candidate is classified."

  - id: "STORY-019"
    title: "Bid Elevator table UI"
    points: 1
    status: "completed"
    sprint: 4
    epic: "Tools"
    owner: "Ryan"
    notes: "src/components/tools/BidElevatorRunner.tsx. Per-keyword row in a 10-column table: keyword + match + current bid + impression/click/order/spend/sales/ACoS + editable new bid input. Highlight rows where ACoS exceeds target. Live summary card shows projected daily spend, budget headroom, count of bids changed. Warning when total new bids exceed the daily budget."

  - id: "STORY-020"
    title: "STR Triage triager UI"
    points: 1
    status: "completed"
    sprint: 4
    epic: "Tools"
    owner: "Ryan"
    notes: "src/components/tools/StrTriageRunner.tsx. Per-term card: search term + matched keyword + match type + 8-cell performance grid + 5-action picker (keep/optimize-bid/pause/negate-exact/negate-phrase). Conditional subfields: optimize-bid reveals new-bid input; negate-* reveals negative-keyword input (defaulted to the term). Live count summary at top. Submit blocked while any term is pending."

  - id: "STORY-018"
    title: "Campaign Builder wizard UI"
    points: 1.5
    status: "completed"
    sprint: 4
    epic: "Tools"
    owner: "Ryan"
    notes: "src/components/tools/CampaignBuilderRunner.tsx. 5-step wizard with stepper indicator: campaign settings (name, type as card picker filtered by scenario's allowedCampaignTypes, start/end date, daily budget) -> bidding (strategy from allowedBidStrategies + default bid) -> ad group (name) -> targets (keywords + product targets as add/remove rows) OR audiences (BTV swap) -> review (full draft display with warnings). Per-step validation gates Next button. BTV scenario switches the targets step to an audiences step and resets the bid strategy to CPM_FIXED. Reuses startToolSession + saveToolSession + submitToolSession; engine unchanged."

