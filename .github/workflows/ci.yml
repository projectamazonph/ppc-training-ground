name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sprint 11 / STORY-052 — run sentry-slack-alert twice a day
    # UTC 01:00 = PHT 09:00 (daily summary)
    # UTC every 30 minutes for spike detection
    - cron: '0 1 * * *'
    - cron: '*/30 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amph_v2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:***@localhost:5432/amph_v2_test
      JWT_SECRET: test-secret-min-32-characters-long-aaaaaaaa
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint (includes no-ai-slop)
        run: pnpm lint

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prisma schema validation
        run: |
          pnpm prisma format --check
          pnpm prisma validate

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Unit + integration tests
        run: pnpm test -- --coverage

      - name: Coverage threshold check
        run: |
          node scripts/check-coverage.js

      - name: Build
        run: pnpm build

      # Sprint 11 / STORY-048 — upload source maps to Sentry
      - name: Upload Sentry source maps
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: pnpm sentry:sourcemaps

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma generate

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm build

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

  # Sprint 11 / STORY-052 — alert cron. Runs in two flavors:
  #   * summary  (once a day, 09:00 PHT)   → always posts a summary to Slack
  #   * spike    (every 30 minutes)        → posts only when threshold breached
  # The workflow-level schedule (above) drives both. We disambiguate by
  # comparing the trigger time to 09:00 PHT inside the script.
  sentry-alert:
    name: Sentry → Slack Alert
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Sentry → Slack alert
        env:
          SENTRY_HOST: ${{ secrets.SENTRY_HOST }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_API_TOKEN: ${{ secrets.SENTRY_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD }}
          WINDOW_MINUTES: ${{ secrets.WINDOW_MINUTES }}
        run: |
          # PHT 09:00 = UTC 01:00 — run as daily summary; otherwise spike mode.
          HOUR_UTC=$(date -u +%H)
          if [ "$HOUR_UTC" = "01" ]; then
            pnpm tsx scripts/sentry-slack-alert.ts --summary
          else
            pnpm tsx scripts/sentry-slack-alert.ts
          fi